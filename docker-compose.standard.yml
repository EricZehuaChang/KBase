# standard profile：面向 100+ 并发生产部署——PostgreSQL 元数据 + Qdrant 向量库
# + TEI（embedding/rerank 各一个实例）。app 本身走 config/kbase.standard.yaml，
# 里面的 endpoint 全部指向本文件的 service name（Docker 内置 DNS）。
#
# 用法：
#   KBASE_ADMIN_PASSWORD=... KBASE_SECRET_KEY=... DASHSCOPE_API_KEY=... \
#   POSTGRES_PASSWORD=... \
#     docker compose -f docker-compose.standard.yml up -d --build
# 或写进项目根目录 .env（docker compose 自动读取，不要提交进仓库）。
#
# 国内网络：
# - postgres:16-alpine / qdrant/qdrant / TEI 镜像拉取缓慢时，可在本机 Docker
#   配置里加 registry-mirrors（如 docker.m.daocloud.io），或把下面镜像名换成
#   对应的国内镜像加速仓库地址，三处任选其一，不要同时改镜像名又配镜像源。
# - TEI 启动时会从 HuggingFace 下载 BAAI/bge-m3 / BAAI/bge-reranker-v2-m3，
#   国内网络建议设置 HF_ENDPOINT=https://hf-mirror.com（已在下面 environment
#   段给出，默认注释，按需打开）。

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kbase
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD}
      POSTGRES_DB: kbase
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kbase -d kbase"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      # qdrant/qdrant 镜像默认不带 curl/wget，用 TCP 端口探测代替 HTTP 探测。
      # 注意（H5 待验证）：/dev/tcp 重定向是 bash 内建语法，若该镜像的 shell
      # 是 dash/busybox ash 而非 bash 则会失败——真实构建时如报错，改用镜像
      # 内实际可用的探测手段（如镜像自带的 qdrant 自身健康检查工具，或直接
      # 去掉 healthcheck 只保留 depends_on 的进程存活判断）。
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    # GPU 部署（GCP VM，与 MonkeyOCR 共存）：把上一行镜像换成不带 -cpu 后缀的
    # GPU 变体（如 ghcr.io/huggingface/text-embeddings-inference:1.5），并取消
    # 注释下面的 deploy 段——CPU 镜像作为默认值保证任何机器都能跑通，GPU 是
    # 生产部署时的显式选择：
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    command: ["--model-id", "BAAI/bge-m3"]
    # 国内网络：从 HF 镜像站下载模型权重，取消注释启用。
    # environment:
    #   HF_ENDPOINT: https://hf-mirror.com
    volumes:
      - tei-embed-cache:/data
    # 注意（H5 待验证）：TEI 官方镜像基于 debian-slim 构建，通常含 bash 但
    # 不含 curl/wget；/dev/tcp 探测同上一处的 H5 待验证说明。
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/80'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    # 同 tei-embed：GPU 部署时换镜像 + 取消注释 deploy 段。
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    command: ["--model-id", "BAAI/bge-reranker-v2-m3"]
    # environment:
    #   HF_ENDPOINT: https://hf-mirror.com
    volumes:
      - tei-rerank-cache:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/80'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kbase:standard
    ports:
      - "8100:8100"
    environment:
      KBASE_SECRET_KEY: ${KBASE_SECRET_KEY:?请设置 KBASE_SECRET_KEY（会话签名密钥）}
      KBASE_ADMIN_PASSWORD: ${KBASE_ADMIN_PASSWORD:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # 等待四个依赖服务的端口就绪后再启动 uvicorn（entrypoint.sh 里的
      # wait-for 逻辑）；depends_on.condition: service_healthy 已经做了一层
      # 保证，这里是双保险。
      KBASE_WAIT_FOR: "postgres:5432,qdrant:6333,tei-embed:80,tei-rerank:80"
    volumes:
      # config/kbase.standard.yaml 覆盖镜像内默认的 config/kbase.yaml（lite），
      # 让 create_app() 默认参数 "config/kbase.yaml" 不变也能加载 standard 配置。
      - ./config/kbase.standard.yaml:/app/config/kbase.yaml:ro
      - ./data:/app/data
    # MonkeyOCR 运行在 compose 之外的宿主/远端 GPU 机器，容器需要能解析
    # host.docker.internal 才能按 config/kbase.standard.yaml 里的 ocr.endpoint
    # 访问它。Docker Desktop（Windows/Mac）默认已支持；Linux 宿主需要这段。
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      tei-embed:
        condition: service_healthy
      tei-rerank:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  pg-data:
  qdrant-data:
  tei-embed-cache:
  tei-rerank-cache:
