# KBase 运行配置。密钥一律走环境变量（api_key_env 指定变量名），本文件可入库。
data_dir: ./data
embedder:
  name: bge-local
  model: BAAI/bge-m3
vectorstore:
  name: chroma
chunker:
  name: structure
  chunk_size: 512
  chunk_overlap: 64
# retrieval 各键默认值见 kbase/config.py RetrievalConfig，按需在此覆盖。
# 注意：rewrite.mode 必须带引号（"off" 不加引号会被 YAML 解析为布尔 False，启动时报校验错误）。
llm:
  # 模型清单为当前 API Key 实测可用集合；qwen2.5 开源系列未开通(403)，如需 36B/72B 对比需在百炼控制台开通或改用其他服务商。
  # qwen3-32b 需通过 params.extra_body 关闭 thinking（否则首 token 延迟 ~11.6s），代表 32B 开源可私有化部署档位
  active: qwen-plus
  providers:
    - name: qwen-plus
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_env: DASHSCOPE_API_KEY
      model: qwen-plus
      max_concurrency: 4
    - name: qwen-max
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_env: DASHSCOPE_API_KEY
      model: qwen-max
      max_concurrency: 4
    - name: deepseek-v3
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_env: DASHSCOPE_API_KEY
      model: deepseek-v3
      max_concurrency: 4
    - name: qwen3-32b
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_env: DASHSCOPE_API_KEY
      model: qwen3-32b
      max_concurrency: 4
      params:
        extra_body:
          enable_thinking: false
# OCR：扫描件/图片摄取时调用 MonkeyOCR 服务转 Markdown（kbase/plugins/ocr/monkey_http.py）。
# endpoint 当前指向开发期 GPU 服务器的 SSH 隧道（本机 7861 转发到远端 MonkeyOCR），
# 生产部署应把 endpoint 换成生产环境自己的 MonkeyOCR 服务地址。
# enabled=false 或服务不可达时，扫描件摄取会优雅降级为 pending_ocr（不阻塞其余文档），
# 不会导致摄取流程报错。
ocr:
  enabled: true
  backend: monkey-http
  endpoint: "http://localhost:7861"
