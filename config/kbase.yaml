# KBase 运行配置。密钥一律走环境变量（api_key_env 指定变量名），本文件可入库。
data_dir: ./data
embedder:
  name: bge-local
  model: BAAI/bge-m3
# KB 级可选向量模型清单（M5-2）：建库时可在 [默认模型]+此清单中选一个绑定，
# 绑定后该库所有摄取/查询固定用它（不同模型向量空间不可比，建库后不可改，
# 换模型需重建库）。id 是 KB 绑定引用的稳定标识，上线后只增不改名。
# embedders:
#   - id: qwen-embed-v3            # 阿里云 DashScope 向量模型（云 API）
#     plugin: openai-embed
#     base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
#     api_key_env: DASHSCOPE_API_KEY
#     model: text-embedding-v3
#   - id: tei-bge                  # 自建 TEI 推理服务
#     plugin: tei
#     endpoint: http://localhost:8080
vectorstore:
  name: chroma
chunker:
  name: structure
  chunk_size: 512
  chunk_overlap: 64
# retrieval 各键默认值见 kbase/config.py RetrievalConfig，按需在此覆盖。
# 注意：rewrite.mode 必须带引号（"off" 不加引号会被 YAML 解析为布尔 False，启动时报校验错误）。
llm:
  # 四厂商 × 两档（性价比 + 最强），2026-07-15 按各家 /models 端点实测清单选定。
  # 关键经验：2026 代旗舰默认开思考模式，首 token 会拖到 5~10s+，非深推理
  # 场景一律用 params 关闭（qwen 系 enable_thinking:false；智谱/deepseek 系
  # thinking.type=disabled，均实测有效）。密钥走环境变量，或在管理端设置页
  # 对任一 provider 直接填 API Key（存 DB，优先于环境变量）。
  active: glm-5-turbo             # 性价比档实测延迟最稳（约1s）且国内网络可靠
  providers:
    - name: glm-5-turbo           # 智谱·性价比档
      base_url: https://open.bigmodel.cn/api/paas/v4
      api_key_env: ZHIPU_API_KEY
      model: glm-5-turbo
      max_concurrency: 4
      params:
        extra_body:
          thinking:
            type: disabled
    - name: glm-5.2               # 智谱·最强档
      base_url: https://open.bigmodel.cn/api/paas/v4
      api_key_env: ZHIPU_API_KEY
      model: glm-5.2
      max_concurrency: 4
      params:
        extra_body:
          thinking:
            type: disabled
    - name: qwen3.7-plus          # 通义·性价比档
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_env: DASHSCOPE_API_KEY
      model: qwen3.7-plus
      max_concurrency: 4
      params:
        extra_body:
          enable_thinking: false
    - name: qwen3.7-max           # 通义·最强档
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_env: DASHSCOPE_API_KEY
      model: qwen3.7-max
      max_concurrency: 4
      params:
        extra_body:
          enable_thinking: false
    - name: deepseek-v4-flash     # DeepSeek·性价比档（实测 ~1s）
      base_url: https://api.deepseek.com/v1
      api_key_env: DEEPSEEK_API_KEY
      model: deepseek-v4-flash
      max_concurrency: 4
      params:
        extra_body:
          thinking:
            type: disabled
    - name: deepseek-v4-pro       # DeepSeek·最强档（深推理，首响应 ~5s，复杂问题用）
      base_url: https://api.deepseek.com/v1
      api_key_env: DEEPSEEK_API_KEY
      model: deepseek-v4-pro
      max_concurrency: 4
      params:
        extra_body:
          thinking:
            type: disabled
    - name: gpt-5.4-mini          # OpenAI·性价比档；国内网络直连能否可达
      base_url: https://api.openai.com/v1   # 因环境而异，接入前先在设置页点"测试"
      api_key_env: OPENAI_API_KEY
      model: gpt-5.4-mini
      max_concurrency: 4
    - name: gpt-5.4               # OpenAI·最强档
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      model: gpt-5.4
      max_concurrency: 4
# OCR：扫描件/图片摄取时转 Markdown。两种后端：
# - glm-ocr（默认推荐）：智谱云 layout_parsing（kbase/plugins/ocr/glm_http.py），
#   密钥走 ZHIPU_API_KEY 环境变量（api_key_env 可改名）；endpoint 留空用官方云，
#   本地 vLLM 跑同一模型时指到本地服务即可（云本同源，切档零适配）。
# - monkey-http：自建 MonkeyOCR 服务（kbase/plugins/ocr/monkey_http.py），
#   endpoint 留空默认 http://localhost:7861。
# enabled=false 或服务不可达时，扫描件摄取会优雅降级为 pending_ocr（不阻塞其余文档），
# 不会导致摄取流程报错；密钥未配置同样降级为 pending_ocr，配好后批量重试即可。
# F 满血 VLM 深度识别（上传时可选的解析模式）：复杂图（概念图/时序图/
# 架构图/PPT 截图）交给强力视觉模型理解性转写，识别结果需在管理端人工
# 校验确认后才向量化。provider 必须是**支持图片输入**的模型（实测
# gpt-5.4-mini 直通；智谱/通义需其 VL 专门型号，文本旗舰不收图）。
vlm_parse:
  provider: gpt-5.4-mini
ocr:
  enabled: true
  backend: glm-ocr
  # endpoint: ""                   # 留空=智谱官方云；vLLM 本地部署时改这里
  # api_key_env: ZHIPU_API_KEY
  # model: glm-ocr
  # --- 切回自建 MonkeyOCR 时使用 ---
  # backend: monkey-http
  # endpoint: "http://localhost:7861"
