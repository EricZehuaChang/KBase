# KBase 运行配置。密钥一律走环境变量（api_key_env 指定变量名），本文件可入库。
data_dir: ./data
embedder:
  name: bge-local
  model: BAAI/bge-m3
# KB 级可选向量模型清单（M5-2）：建库时可在 [默认模型]+此清单中选一个绑定，
# 绑定后该库所有摄取/查询固定用它（不同模型向量空间不可比，建库后不可改，
# 换模型需重建库）。id 是 KB 绑定引用的稳定标识，上线后只增不改名。
# embedders:
#   - id: qwen-embed-v3            # 阿里云 DashScope 向量模型（云 API）
#     plugin: openai-embed
#     base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
#     api_key_env: DASHSCOPE_API_KEY
#     model: text-embedding-v3
#   - id: tei-bge                  # 自建 TEI 推理服务
#     plugin: tei
#     endpoint: http://localhost:8080
vectorstore:
  name: chroma
chunker:
  name: structure
  chunk_size: 512
  chunk_overlap: 64
# retrieval 各键默认值见 kbase/config.py RetrievalConfig，按需在此覆盖。
# 注意：rewrite.mode 必须带引号（"off" 不加引号会被 YAML 解析为布尔 False，启动时报校验错误）。
llm:
  # 模型清单为当前 API Key 实测可用集合；qwen2.5 开源系列未开通(403)，如需 36B/72B 对比需在百炼控制台开通或改用其他服务商。
  # qwen3-32b 需通过 params.extra_body 关闭 thinking（否则首 token 延迟 ~11.6s），代表 32B 开源可私有化部署档位
  active: qwen-plus
  providers:
    - name: qwen-plus
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_env: DASHSCOPE_API_KEY
      model: qwen-plus
      max_concurrency: 4
    - name: qwen-max
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_env: DASHSCOPE_API_KEY
      model: qwen-max
      max_concurrency: 4
    - name: deepseek-v3
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_env: DASHSCOPE_API_KEY
      model: deepseek-v3
      max_concurrency: 4
    - name: qwen3-32b
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_env: DASHSCOPE_API_KEY
      model: qwen3-32b
      max_concurrency: 4
      params:
        extra_body:
          enable_thinking: false
    # 更快档位与多厂商强力模型（M5-2）：密钥可走环境变量，也可在管理端
    # 设置页对任一 provider 直接填 API Key（存 DB，优先于环境变量）。
    - name: qwen-turbo            # 通义最快档，日常问答提速首选
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_env: DASHSCOPE_API_KEY
      model: qwen-turbo
      max_concurrency: 4
    - name: glm-4-flash           # 智谱快档
      base_url: https://open.bigmodel.cn/api/paas/v4
      api_key_env: ZHIPU_API_KEY
      model: glm-4-flash
      max_concurrency: 4
    - name: glm-4.6               # 智谱强力档；必须关思考模式，否则首 token
      base_url: https://open.bigmodel.cn/api/paas/v4   # 超 10s（实测关闭后 ~0.7s）
      api_key_env: ZHIPU_API_KEY
      model: glm-4.6
      max_concurrency: 4
      params:
        extra_body:
          thinking:
            type: disabled
    - name: deepseek-chat
      base_url: https://api.deepseek.com/v1
      api_key_env: DEEPSEEK_API_KEY
      model: deepseek-chat
      max_concurrency: 4
    - name: gpt-4o-mini           # OpenAI；国内网络直连可能不可达，接入前先在设置页点"测试"
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      model: gpt-4o-mini
      max_concurrency: 4
# OCR：扫描件/图片摄取时转 Markdown。两种后端：
# - glm-ocr（默认推荐）：智谱云 layout_parsing（kbase/plugins/ocr/glm_http.py），
#   密钥走 ZHIPU_API_KEY 环境变量（api_key_env 可改名）；endpoint 留空用官方云，
#   本地 vLLM 跑同一模型时指到本地服务即可（云本同源，切档零适配）。
# - monkey-http：自建 MonkeyOCR 服务（kbase/plugins/ocr/monkey_http.py），
#   endpoint 留空默认 http://localhost:7861。
# enabled=false 或服务不可达时，扫描件摄取会优雅降级为 pending_ocr（不阻塞其余文档），
# 不会导致摄取流程报错；密钥未配置同样降级为 pending_ocr，配好后批量重试即可。
ocr:
  enabled: true
  backend: glm-ocr
  # endpoint: ""                   # 留空=智谱官方云；vLLM 本地部署时改这里
  # api_key_env: ZHIPU_API_KEY
  # model: glm-ocr
  # --- 切回自建 MonkeyOCR 时使用 ---
  # backend: monkey-http
  # endpoint: "http://localhost:7861"
